# Ansible Inventory 示例文件
# 包含多种配置示例，根据需要取消注释使用

# ============================================
# 基础主机定义
# ============================================

# 单个主机（直接使用域名或IP）
server1.example.com
server2.example.com
192.168.1.100
192.168.1.101

# 带连接参数的主机
web01.example.com ansible_host=192.168.1.10 ansible_user=deploy ansible_port=22
web02.example.com ansible_host=192.168.1.11 ansible_user=admin ansible_port=2222

# 本地测试（不需要SSH）
localhost ansible_connection=local ansible_python_interpreter=/usr/bin/python3

# ============================================
# 主机组定义
# ============================================

# Web服务器组
[webservers]
web01.example.com ansible_host=192.168.1.10
web02.example.com ansible_host=192.168.1.11
web03.example.com ansible_host=192.168.1.12

# 数据库服务器组
[dbservers]
db01.example.com ansible_host=192.168.1.20
db02.example.com ansible_host=192.168.1.21

# 缓存服务器组
[cacheservers]
cache01.example.com ansible_host=192.168.1.30
cache02.example.com ansible_host=192.168.1.31

# 应用服务器组
[appservers]
app01.example.com ansible_host=192.168.1.40
app02.example.com ansible_host=192.168.1.41

# ============================================
# 嵌套组定义
# ============================================

# 生产环境组（包含webservers和dbservers）
[production:children]
webservers
dbservers

# 开发环境组
[development:children]
appservers

# 所有服务器组
[allservers:children]
webservers
dbservers
cacheservers
appservers

# ============================================
# 组变量
# ============================================

# Web服务器组的变量
[webservers:vars]
http_port=80
https_port=443
max_clients=200
nginx_version="1.18"
deploy_user="www-data"

# 数据库服务器组的变量  
[dbservers:vars]
mysql_port=3306
mysql_version="8.0"
innodb_buffer_pool_size="1G"
max_connections=100

# 缓存服务器组的变量
[cacheservers:vars]
redis_port=6379
redis_maxmemory="512mb"
redis_password="changeme"

# 生产环境变量
[production:vars]
environment="production"
backup_enabled=true
monitoring_enabled=true

# 开发环境变量
[development:vars]
environment="development"
debug_enabled=true
log_level="debug"

# 所有主机的通用变量
[all:vars]
# SSH连接设置
ansible_ssh_private_key_file=~/.ssh/id_rsa
ansible_ssh_common_args='-o StrictHostKeyChecking=no'

# Python设置
ansible_python_interpreter=/usr/bin/python3

# 超时设置
ansible_ssh_timeout=30
ansible_command_timeout=300

# 性能优化
ansible_pipelining=true
ansible_ssh_executable=/usr/bin/ssh

# ============================================
# 模式匹配示例
# ============================================

# 按数字范围匹配
# [webservers:children]
# web[01:05].example.com  # 匹配 web01 到 web05

# 按字母范围匹配
# [dbservers:children]
# db-[a:e].example.com    # 匹配 db-a 到 db-e

# ============================================
# 动态 Inventory 示例（需取消注释）
# ============================================

# 使用 AWS EC2 动态 Inventory
# [aws_ec2:children]
# aws_ec2

# 使用 VMware vCenter 动态 Inventory  
# [vmware:children]
# vmware

# ============================================
# Windows 主机示例
# ============================================

# Windows 服务器组
[windows_servers]
win01.example.com ansible_host=192.168.1.50 ansible_user=Administrator ansible_password=Password123 ansible_connection=winrm ansible_winrm_port=5986 ansible_winrm_scheme=https ansible_winrm_transport=ssl ansible_winrm_server_cert_validation=ignore
win02.example.com ansible_host=192.168.1.51 ansible_user=Admin ansible_password=Password123 ansible_connection=winrm

# Windows 主机变量
[windows_servers:vars]
ansible_shell_type=powershell
ansible_winrm_operation_timeout_sec=60
ansible_winrm_read_timeout_sec=70

# ============================================
# 变量文件引用示例
# ============================================

# 可以引用外部变量文件
# [all:vars]
# include_vars:
#   - "vars/common.yml"
#   - "vars/{{ environment }}.yml"

# ============================================
# 使用说明
# ============================================

# 1. 将此文件保存为 inventory.ini
# 2. 根据需要取消注释相应的配置
# 3. 修改主机名、IP地址和凭证信息
# 4. 使用命令测试：
#    ansible all -i inventory.ini --list-hosts
#    ansible all -i inventory.ini -m ping
#    ansible webservers -i inventory.ini -a "uptime"

# 提示：
# - 实际使用时删除注释和示例，保持简洁
# - 敏感信息（密码、密钥）建议使用 ansible-vault 加密
# - 大型环境建议使用动态 Inventory 或拆分多个文件